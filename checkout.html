<style>

/* General Style */
body{
    margin:0;
    font-family: Arial, Helvetica, sans-serif;
    background:#f4f4f4;
}

/* Header */
header{
    background:#333;
    color:white;
    padding:15px;
}

nav{
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.logo{
    font-size:24px;
    font-weight:bold;
}

nav ul{
    list-style:none;
    display:flex;
    margin:0;
    padding:0;
}

nav ul li{
    margin-left:20px;
}

nav ul li a{
    color:white;
    text-decoration:none;
}

nav ul li a:hover{
    color:orange;
}

/* Checkout Form */
.checkout-section{
    padding:40px;
    display:flex;
    justify-content:center;
}

.checkout-form{
    background:white;
    padding:30px;
    border-radius:5px;
    box-shadow:0 0 5px rgba(0,0,0,0.2);
    width:400px;
}

.checkout-form h2{
    text-align:center;
}

.checkout-form label{
    display:block;
    margin-top:15px;
}

.checkout-form input, 
.checkout-form select{
    width:100%;
    padding:8px;
    margin-top:5px;
    border-radius:3px;
    border:1px solid #ccc;
}

.checkout-form button{
    margin-top:20px;
    width:100%;
    padding:10px;
    background:#333;
    color:white;
    border:none;
    cursor:pointer;
    font-size:16px;
}

.checkout-form button:hover{
    background:orange;
}

/* Footer */
#footer{

    justify-content: space-between; /* left + right */
    align-items: center;            /* same horizontal line */
    background-color: #333;
    color: white;
    padding: 20px;
    height: 100px;
}

/* remove bullets */
.footer-right{
    list-style: none;
    display: flex;      /* make items in one row */

    padding: 0;
  
}

.footer-right li a{
    text-decoration: none;
    cursor: pointer;
    color: #f4f4f4;

.footer-right li a:hover{
