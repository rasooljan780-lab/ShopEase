
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - ShopEase</title>

<style>

/* General Style */
body{
    margin:0;
    font-family: Arial, Helvetica, sans-serif;
    background:#f4f4f4;
}

/* Header */
header{
    background:#333;
    color:white;
    padding:15px;
}

nav{
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.logo{
    font-size:24px;
    font-weight:bold;
}

nav ul{
    list-style:none;
    display:flex;
    margin:0;
    padding:0;
}

nav ul li{
    margin-left:20px;
}

nav ul li a{
    color:white;
    text-decoration:none;
}

nav ul li a:hover{
    color:orange;
}

/* Login Form */
.login-section{
    padding:60px 20px;
    display:flex;
    justify-content:center;
}

.login-form{
    background:white;
    padding:30px;
    border-radius:5px;
    box-shadow:0 0 5px rgba(0,0,0,0.2);
    width:350px;
}

.login-form h2{
    text-align:center;
}

.login-form label{
    display:block;
    margin-top:15px;
}

.login-form input{
    width:100%;
    padding:8px;
    margin-top:5px;
    border-radius:3px;
    border:1px solid #ccc;
}

.login-form button{
    margin-top:20px;
    width:100%;
    padding:10px;
    background:#333;
    color:white;
    border:none;
    cursor:pointer;
    font-size:16px;
}

.login-form button:hover{
    background:orange;
}

.login-form p{
    text-align:center;
    margin-top:15px;
}

.login-form a{
    color:orange;
    text-decoration:none;
}

.login-form a:hover{
    text-decoration:underline;
}

/* Footer */
/* footer{
    background:#333;
    color:white;
    text-align:left;
    padding:20px;
    margin-top:40px;
} */
/* Footer */
#footer{
    display: flex;
    justify-content: space-between; /* left + right */
    align-items: center;            /* same horizontal line */
    background-color: #333;
    color: white;
    padding: 20px;
    height: 100px;
}

/* remove bullets */
.footer-right{
    list-style: none;
    display: flex;      /* make items in one row */
    gap: 20px;         /* space between items */
    margin: 0;
    padding: 0;
  
}

.footer-right li a{
    text-decoration: none;
    cursor: pointer;
    color: #f4f4f4;
    
}
.footer-right li a:hover{
    color:orange;
}

</style>
</head>

<body>

<header>

<nav>

<div class="logo">ShopEase</div>

<ul>
<li><a href="index.html">Home</a></li>
<li><a href="shop.html">Shop</a></li>
<li><a href="category.html">Categories</a></li>
<li><a href="about.html">About</a></li>
<li><a href="contact.html">Contact</a></li>
<li><a href="cart.html">Cart</a></li>
<li><a href="login.html">Login</a></li>
</ul>

</nav>

</header>

<!-- Login Form -->

<section class="login-section">

<div class="login-form">

<h2>Login</h2>

<form>

<label for="email">Email</label>
<input type="email" id="email" placeholder="Enter your email" required>

<label for="password">Password</label>
<input type="password" id="password" placeholder="Enter your password" required>

<button type="submit"><a href="index.html"></a>Login</button>

<p>Don't have an account? <a href="register.html">Register Here</a></p>

</form>

</div>

</section>

<footer id="footer">

    <div class="footer-left">
        <p>© 2026 ShopEase | All Rights Reserved</p>
        <p>
            Email:
            <a href="mailto:support@shopease.com">support@shopease.com</a>
            Phone:
            <a href="tel:+923350720157">+92 335 0720157</a>
        </p>
    </div>
    <div>
        <ul class="footer-right">
            <li> <a href="Terms&Conditions.html">Terms & Conditions</a></li>
            <li><a href="faq.html">FAQs</a></li>
            <!-- <li><a href="product.html">Product</a></li>
            <li><a href="orders.html">Orders</a></li> -->
            
        </ul>
    </div>

</footer>

</body>
<script src="script.js"></script>

</html>
